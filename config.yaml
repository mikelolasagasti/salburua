# Salburua — Guraso elkartea (Hugo)
baseURL: 'https://salburua.mundurat.net/'
languageCode: eu
defaultContentLanguage: eu
# English pluralization mangles Basque section titles (e.g. Berriak → Berriaks).
pluralizeListTitles: false
title: Salburua Guraso Elkartea

# Default Hugo taxonomies (categories/tags) create empty list URLs; we only use section "berriak".
# Re-enable by removing these lines and adding taxonomies / front matter if needed later.
disableKinds:
  - taxonomy
  - term

theme: salburua

params:
  description: Salburua ikastetxeko guraso elkartearen webgune ofiziala.
  author: Salburua Guraso Elkartea

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
